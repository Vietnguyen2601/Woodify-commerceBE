# ================================================================
# WOODIFY MICROSERVICES - DOCKER COMPOSE
# ================================================================
# Chạy: docker-compose up -d
# Dừng: docker-compose down
# Xem logs: docker-compose logs -f [service-name]
# ================================================================

services:
  # ==============================================================
  # POSTGRESQL DATABASE
  # ==============================================================
  # PostgreSQL chính - tự động tạo các database cho từng service
  postgres:
    image: postgres:16-alpine
    container_name: woodify-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    networks:
      - woodify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================
  # RABBITMQ MESSAGE BROKER
  # ==============================================================
  # Management UI: http://localhost:15672 (guest/guest)
  # AMQP Port: 5672
  # Dùng cho communication giữa các services (Event-Driven Architecture)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: woodify-rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - woodify-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # ==============================================================
  # ADMINER - DATABASE MANAGEMENT UI
  # ==============================================================
  # Web UI để quản lý PostgreSQL
  # Truy cập: http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: woodify-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - woodify-network
    depends_on:
      - postgres

  # ==============================================================
  # API GATEWAY (YARP)
  # ==============================================================
  # Entry point cho tất cả API calls
  # Port: 5000 (HTTP), 5001 (HTTPS)
  # Routes traffic đến các backend services
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: woodify-api-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - identity-service
      - product-service
    networks:
      - woodify-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================================
  # IDENTITY SERVICE
  # ==============================================================
  # Quản lý: User, Account
  # Database: identity_db
  # Port: 5010
  identity-service:
    build:
      context: .
      dockerfile: src/Services/IdentityService/IdentityService.APIService/Dockerfile
    container_name: woodify-identity-service
    restart: unless-stopped
    ports:
      - "5010:5010"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ_Host=${RabbitMQ_Host}
      - RabbitMQ_Port=${RabbitMQ_Port}
      - RabbitMQ_Username=${RabbitMQ_Username}
      - RabbitMQ_Password=${RabbitMQ_Password}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network

  # ==============================================================
  # SHOP SERVICE
  # ==============================================================
  # Quản lý: Shop, Follow
  # Database: shop_db
  # Port: 5011
  shop-service:
    build:
      context: .
      dockerfile: src/Services/ShopService/ShopService.APIService/Dockerfile
    container_name: woodify-shop-service
    restart: unless-stopped
    ports:
      - "5011:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ./.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network

  # ==============================================================
  # PRODUCT SERVICE
  # ==============================================================
  # Quản lý: Product, Certificate
  # Database: product_db
  # Port: 5012
  product-service:
    build:
      context: .
      dockerfile: src/Services/ProductService/ProductService.APIService/Dockerfile
    container_name: woodify-product-service
    restart: unless-stopped
    ports:
      - "5012:5012"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ_Host=${RabbitMQ_Host}
      - RabbitMQ_Port=${RabbitMQ_Port}
      - RabbitMQ_Username=${RabbitMQ_Username}
      - RabbitMQ_Password=${RabbitMQ_Password}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network

  # ==============================================================
  # SHIPMENT SERVICE
  # ==============================================================
  # Quản lý: Shipment, Delivery
  # Database: shipment_db
  # Port: 5016
  shipment-service:
    build:
      context: .
      dockerfile: src/Services/ShipmentService/ShipmentService.APIService/Dockerfile
    container_name: woodify-shipment-service
    restart: unless-stopped
    ports:
      - "5016:5016"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ_Host=${RabbitMQ_Host}
      - RabbitMQ_Port=${RabbitMQ_Port}
      - RabbitMQ_Username=${RabbitMQ_Username}
      - RabbitMQ_Password=${RabbitMQ_Password}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network

  # ==============================================================
  # ORDER SERVICE
  # ==============================================================
  # Quản lý: Cart, Order
  # Database: order_db
  # Port: 5014
  order-service:
    build:
      context: .
      dockerfile: src/Services/OrderService/OrderService.APIService/Dockerfile
    container_name: woodify-order-service
    restart: unless-stopped
    ports:
      - "5014:5014"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ_Host=${RabbitMQ_Host}
      - RabbitMQ_Port=${RabbitMQ_Port}
      - RabbitMQ_Username=${RabbitMQ_Username}
      - RabbitMQ_Password=${RabbitMQ_Password}
      # - ProductService_Url=http://woodify-product-service:5012
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network

  # ==============================================================
  # PAYMENT SERVICE
  # ==============================================================
  # Quản lý: Payment, Wallet
  # Database: payment_db
  # Port: 5015
  payment-service:
    build:
      context: .
      dockerfile: src/Services/PaymentService/PaymentService.APIService/Dockerfile
    container_name: woodify-payment-service
    restart: unless-stopped
    ports:
      - "5015:5015"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ_Host=${RabbitMQ_Host}
      - RabbitMQ_Port=${RabbitMQ_Port}
      - RabbitMQ_Username=${RabbitMQ_Username}
      - RabbitMQ_Password=${RabbitMQ_Password}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - woodify-network


# ==============================================================
# NETWORKS
# ==============================================================
networks:
  woodify-network:
    driver: bridge
    name: woodify-network

# ==============================================================
# VOLUMES
# ==============================================================
# Lưu trữ persistent data
volumes:
  postgres_data:
    name: woodify-postgres-data
  rabbitmq_data:
    name: woodify-rabbitmq-data
