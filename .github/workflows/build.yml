name: Build & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore WoodifyBE.sln

    - name: Build solution
      run: dotnet build WoodifyBE.sln --configuration Release --no-restore

    - name: Check build artifacts
      run: |
        echo "✅ Build completed successfully"
        ls -la src/ApiGateway/bin/Release/net8.0/ || echo "API Gateway build directory"

  lint:
    name: Code Style & Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install .NET format tool
      run: dotnet tool install -g dotnet-format

    - name: Check code formatting
      run: dotnet format WoodifyBE.sln --verify-no-changes --verbosity diagnostic || exit 0
      continue-on-error: true

  docker-build:
    name: Verify Docker Images Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Gateway Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/ApiGateway/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Payment Service Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/Services/PaymentService/PaymentService.APIService/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

    - name: Build Product Service Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/Services/ProductService/ProductService.APIService/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

    - name: Build Identity Service Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/Services/IdentityService/IdentityService.APIService/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, lint, docker-build]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "========================================="
        echo "       WOODIFY CI/CD BUILD SUMMARY"
        echo "========================================="
        echo "✅ .NET Build: ${{ needs.build.result }}"
        echo "✅ Code Linting: ${{ needs.lint.result }}"
        echo "✅ Docker Build: ${{ needs.docker-build.result }}"
        echo "========================================="
        
        if [ "${{ needs.build.result }}" != "success" ]; then
          echo "❌ Build failed!"
          exit 1
        fi
