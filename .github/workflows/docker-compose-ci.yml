name: Docker Compose CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker-compose-ci:
    name: Docker Compose with Services
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file from secrets
      run: |
        cat > .env << EOF
        POSTGRES_USER=${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB=${{ secrets.POSTGRES_DB }}
        RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
        RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
        RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
        RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
        RabbitMQ_Host=${{ secrets.RABBITMQ_HOST }}
        RabbitMQ_Port=${{ secrets.RABBITMQ_PORT }}
        RabbitMQ_Username=${{ secrets.RABBITMQ_USER }}
        RabbitMQ_Password=${{ secrets.RABBITMQ_PASSWORD }}
        ConnectionStrings__IdentityService=${{ secrets.CONNECTIONSTRINGS__IDENTITYSERVICE }}
        ConnectionStrings__ShopService=${{ secrets.CONNECTIONSTRINGS__SHOPSERVICE }}
        ConnectionStrings__ProductService=${{ secrets.CONNECTIONSTRINGS__PRODUCTSERVICE }}
        ConnectionStrings__InventoryService=${{ secrets.CONNECTIONSTRINGS__INVENTORYSERVICE }}
        ConnectionStrings__OrderService=${{ secrets.CONNECTIONSTRINGS__ORDERSERVICE }}
        ConnectionStrings__PaymentService=${{ secrets.CONNECTIONSTRINGS__PAYMENTSERVICE }}
        ASPNETCORE_ENVIRONMENT=Development
        JWT_KEY=${{ secrets.JWT_KEY }}
        JWT_ISSUER=${{ secrets.JWT_ISSUER }}
        JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
        JWT_REFRESH_KEY=${{ secrets.JWT_REFRESH_KEY }}
        PAYOS_CLIENT_ID=${{ secrets.PAYOS_CLIENT_ID }}
        PAYOS_API_KEY=${{ secrets.PAYOS_API_KEY }}
        PAYOS_CHECKSUM_KEY=${{ secrets.PAYOS_CHECKSUM_KEY }}
        EMAIL_FROM=${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
        EOF
        echo "✅ .env file created successfully"

    - name: Validate .env file
      run: |
        if [ -f .env ]; then
          echo ".env file exists"
          wc -l .env
        else
          echo ".env file not found"
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validate docker-compose.yml
      run: |
        docker compose config --quiet
        echo "✅ docker-compose.yml is valid"

    - name: Build Docker images
      run: |
        docker-compose build --no-cache postgres rabbitmq api-gateway identity-service product-service payment-service order-service
        echo "✅ Docker images built successfully"
      continue-on-error: true

    - name: Start services (optional - for testing)
      run: |
        docker-compose up -d postgres rabbitmq
        sleep 10
        docker-compose logs
      continue-on-error: true

    - name: Check service health
      run: |
        docker-compose ps
      continue-on-error: true

    - name: Cleanup
      if: always()
      run: |
        docker-compose down -v || true
        echo "✅ Cleanup completed"
